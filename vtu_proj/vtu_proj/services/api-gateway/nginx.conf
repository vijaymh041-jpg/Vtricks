upstream auth_service         { server auth-service:3001;         keepalive 32; }
upstream product_service      { server product-service:3002;      keepalive 32; }
upstream order_service        { server order-service:3003;        keepalive 32; }
upstream payment_service      { server payment-service:3004;      keepalive 32; }
upstream notification_service { server notification-service:3005; keepalive 32; }
upstream frontend             { server frontend:3000;             keepalive 16; }

limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
  listen 80;
  server_name _;
  client_max_body_size 20M;

  # ── Security headers ──
  add_header X-Frame-Options        "SAMEORIGIN"  always;
  add_header X-Content-Type-Options "nosniff"     always;
  add_header X-XSS-Protection       "1; mode=block" always;

  # ── Health ──
  location /health {
    default_type application/json;
    return 200 '{"status":"ok","gateway":"shopwave","version":"1.0.0"}';
  }

  # ── Auth routes ──
  location ~ ^/api/(users) {
    limit_req zone=auth burst=20 nodelay;
    proxy_pass         http://auth_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
  }

  # ── Product routes ──
  location /api/products {
    limit_req zone=api burst=40 nodelay;
    proxy_pass         http://product_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
  }

  # ── Order routes ──
  location /api/orders {
    limit_req zone=api burst=30 nodelay;
    proxy_pass         http://order_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
  }

  # ── Payment routes ──
  location /api/payments {
    limit_req zone=auth burst=10 nodelay;
    proxy_pass         http://payment_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
  }

  # ── Notification routes ──
  location /api/notifications {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://notification_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
  }

  # ── Frontend (SPA) ──
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_cache_bypass $http_upgrade;
  }

  # ── Error pages ──
  error_page 502 503 504 @gateway_error;
  location @gateway_error {
    default_type application/json;
    return 503 '{"error":"Service temporarily unavailable"}';
  }
}
